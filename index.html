<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 설비 P.M 시스템</title>
    <!-- CSS: Tailwind CSS (디자인) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Icons: Lucide (아이콘) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Excel & PDF Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        button, select, input { min-height: 44px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <!-- 로그인 화면 -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border border-slate-200 text-center">
            <div class="bg-blue-100 p-4 rounded-full inline-block mb-4 text-blue-700">
                <i data-lucide="wrench" class="w-10 h-10"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800 mb-2">스마트 P.M 시스템</h1>
            <p class="text-sm text-slate-500 mb-6 font-medium text-center">현장 점검자 성함을 입력해주세요.</p>
            <input type="text" id="inspector-name" placeholder="이름 (예: 김철수 반장)" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl mb-4 focus:ring-2 focus:ring-blue-500 outline-none text-center font-bold">
            <button id="login-btn" onclick="handleLogin()" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95 disabled:opacity-50">
                클라우드 접속하기
            </button>
        </div>
    </div>

    <!-- 메인 앱 화면 -->
    <div id="main-app" class="hidden flex flex-col min-h-screen max-w-md mx-auto bg-white shadow-2xl relative">
        <header class="bg-blue-700 text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-md">
            <div class="flex items-center">
                <i data-lucide="activity" class="w-6 h-6 mr-2"></i>
                <h1 class="text-lg font-bold">스마트 P.M 기록</h1>
            </div>
            <div class="flex items-center space-x-2 text-xs font-bold bg-blue-800 px-2 py-1 rounded">
                <i data-lucide="user" class="w-3 h-3"></i>
                <span id="display-user"></span>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto pb-24 p-4 space-y-6">
            
            <!-- 점검 입력 탭 -->
            <div id="tab-form" class="tab-content active space-y-4">
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm">
                    <label class="block text-sm font-bold text-slate-700 mb-2">설비 선택</label>
                    <div class="flex gap-2 mb-3">
                        <select id="eq-class-filter" onchange="renderEquipmentList()" class="bg-white border rounded-lg px-2 text-xs font-bold">
                            <option value="전체">전체</option>
                            <option value="A">A급</option>
                            <option value="B">B급</option>
                            <option value="C">C급</option>
                            <option value="D">D급</option>
                        </select>
                        <input type="text" id="eq-search" placeholder="ID 또는 설비명 검색..." class="flex-1 p-2 border rounded-lg text-sm" oninput="renderEquipmentList()">
                    </div>
                    <div id="eq-list" class="max-h-40 overflow-y-auto bg-white border rounded-lg divide-y text-sm mb-3"></div>
                    <div id="selected-eq-info" class="hidden bg-blue-100 p-3 rounded-lg flex justify-between items-center border border-blue-200">
                        <span id="selected-text" class="text-blue-800 font-bold text-sm"></span>
                        <button onclick="clearSelection()" class="text-xs font-bold text-blue-600 bg-white px-2 py-1 rounded shadow-sm">다시 선택</button>
                    </div>
                </div>

                <div class="space-y-6" id="pm-sections">
                    <div class="bg-white p-4 rounded-xl border shadow-sm">
                        <h3 class="font-bold mb-3 flex items-center"><i data-lucide="zap" class="w-4 h-4 mr-2 text-amber-500"></i>진동 점검 (mm/s)</h3>
                        <div class="grid grid-cols-2 gap-3" id="vibration-inputs"></div>
                    </div>
                    <div class="bg-white p-4 rounded-xl border shadow-sm">
                        <h3 class="font-bold mb-3 flex items-center"><i data-lucide="flame" class="w-4 h-4 mr-2 text-rose-500"></i>발열 점검 (°C)</h3>
                        <div class="grid grid-cols-2 gap-3" id="heating-inputs"></div>
                    </div>
                    <div class="bg-white p-4 rounded-xl border shadow-sm">
                        <h3 class="font-bold mb-3 flex items-center"><i data-lucide="droplet" class="w-4 h-4 mr-2 text-blue-500"></i>오일 및 리크</h3>
                        <div class="space-y-3" id="oil-inputs">
                            <div class="flex justify-between items-center p-2 bg-slate-50 rounded">
                                <span class="text-sm font-medium">오일 레벨</span>
                                <select id="oil-level" class="text-sm border rounded px-2"><option>양호</option><option>보충</option><option>부족</option></select>
                            </div>
                            <div class="flex justify-between items-center p-2 bg-slate-50 rounded">
                                <span class="text-sm font-medium">누유 여부</span>
                                <select id="oil-leak" class="text-sm border rounded px-2"><option>정상</option><option>누유</option></select>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white p-4 rounded-xl border shadow-sm">
                        <h3 class="font-bold mb-3 flex items-center"><i data-lucide="camera" class="w-4 h-4 mr-2 text-slate-500"></i>현장 사진</h3>
                        <input type="file" id="photo-upload" accept="image/*" capture="environment" class="hidden" onchange="handlePhotoUpload(this)">
                        <label for="photo-upload" class="w-full border-2 border-dashed rounded-lg py-8 flex flex-col items-center justify-center text-slate-400 cursor-pointer">
                            <i data-lucide="camera" class="w-8 h-8 mb-1"></i>
                            <span class="text-sm font-bold">사진 촬영 (또는 파일 선택)</span>
                        </label>
                        <div id="photo-preview" class="grid grid-cols-2 gap-2 mt-3"></div>
                    </div>
                    <div class="bg-white p-4 rounded-xl border shadow-sm">
                        <h3 class="font-bold mb-2">특이사항</h3>
                        <textarea id="remarks" rows="3" class="w-full p-3 bg-slate-50 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="특이사항 및 조치내역을 입력하세요."></textarea>
                    </div>
                </div>

                <button onclick="saveRecord()" class="w-full bg-blue-700 text-white font-bold py-4 rounded-xl shadow-xl flex justify-center items-center active:scale-95 transition-all">
                    <i data-lucide="save" class="w-5 h-5 mr-2"></i> 클라우드에 점검 결과 저장
                </button>
            </div>

            <!-- 이력 조회 탭 -->
            <div id="tab-history" class="tab-content space-y-4">
                <div class="flex gap-2">
                    <button onclick="downloadExcel()" class="flex-1 bg-emerald-600 text-white font-bold py-2 rounded-lg text-xs flex items-center justify-center shadow-sm">
                        <i data-lucide="file-spreadsheet" class="w-4 h-4 mr-1"></i> 엑셀 저장
                    </button>
                </div>
                <div id="history-container" class="space-y-4"></div>
            </div>

            <!-- 설정 탭 -->
            <div id="tab-settings" class="tab-content space-y-6">
                <div class="bg-white p-4 rounded-xl border shadow-sm">
                    <h3 class="font-bold mb-4 flex items-center"><i data-lucide="plus" class="w-4 h-4 mr-2"></i>설비 수동 추가</h3>
                    <div class="space-y-3">
                        <div class="flex gap-2">
                            <select id="new-eq-class" class="border rounded p-2 text-xs font-bold"><option>A</option><option>B</option><option selected>C</option><option>D</option></select>
                            <input type="text" id="new-eq-id" placeholder="설비 ID" class="flex-1 border rounded p-2 text-sm">
                        </div>
                        <input type="text" id="new-eq-name" placeholder="설비명" class="w-full border rounded p-2 text-sm">
                        <button onclick="addEquipment()" class="w-full bg-slate-800 text-white font-bold py-3 rounded-lg text-sm">클라우드에 추가</button>
                    </div>
                </div>
                <div class="bg-white p-4 rounded-xl border shadow-sm">
                    <h3 class="font-bold mb-2">등록된 설비 (<span id="eq-count">0</span>대)</h3>
                    <div id="settings-eq-list" class="max-h-64 overflow-y-auto divide-y text-xs border rounded-lg"></div>
                </div>
                <button onclick="logout()" class="w-full bg-white border border-slate-300 text-slate-500 font-bold py-3 rounded-xl">로그아웃</button>
            </div>
        </main>

        <nav class="fixed bottom-0 w-full max-w-md bg-white border-t border-slate-200 flex shadow-[0_-5px_15px_rgba(0,0,0,0.05)] z-50">
            <button onclick="switchTab('form')" class="flex-1 py-4 flex flex-col items-center justify-center text-blue-700 nav-btn" data-tab="form">
                <i data-lucide="clipboard-check" class="w-6 h-6 mb-1"></i>
                <span class="text-[10px] font-bold">상세 점검</span>
            </button>
            <button onclick="switchTab('history')" class="flex-1 py-4 flex flex-col items-center justify-center text-slate-400 nav-btn" data-tab="history">
                <i data-lucide="history" class="w-6 h-6 mb-1"></i>
                <span class="text-[10px] font-bold">점검 이력</span>
            </button>
            <button onclick="switchTab('settings')" class="flex-1 py-4 flex flex-col items-center justify-center text-slate-400 nav-btn" data-tab="settings">
                <i data-lucide="settings" class="w-6 h-6 mb-1"></i>
                <span class="text-[10px] font-bold">설비 관리</span>
            </button>
        </nav>
    </div>

    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl z-[100] opacity-0 transition-opacity pointer-events-none font-bold text-sm">
        알림 메시지
    </div>

    <!-- Firebase SDK (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 🔑 [환경 설정 및 경로 세니타이징]
        // ==========================================
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
  apiKey: "AIzaSyCzTEKN9djNzuXwFUCrjfhfMXi5By25lwE",
  authDomain: "smart-pm-system.firebaseapp.com",
  projectId: "smart-pm-system",
  storageBucket: "smart-pm-system.firebasestorage.app",
  messagingSenderId: "670061026122",
  appId: "1:670061026122:web:b79aa67a686e2ef204bfb3",
  measurementId: "G-VM7ENYM6EP"
        };
        
        // 💡 중요: __app_id 내의 슬래시(/)를 언더바(_)로 치환하여 5세그먼트 경로 규칙(artifacts/ID/public/data/coll) 엄수
        const rawAppId = typeof __app_id !== 'undefined' ? String(__app_id) : 'smart-pm-default';
        const appId = rawAppId.replace(/\//g, '_'); 

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 전역 상태
        window.currentUser = null;
        window.equipments = [];
        window.records = [];
        window.selectedEqId = null;
        window.photos = [];
        let listenersSet = false;

        window.onload = async () => {
            lucide.createIcons();
            renderInputFields();
            await initFirebaseAuth();
        };

        async function initFirebaseAuth() {
            try {
                // 1. 우선적으로 인증 시도
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                // 2. 인증 상태 변경 감지 후 리스너 설정
                onAuthStateChanged(auth, (user) => {
                    if (user && !listenersSet) {
                        listenersSet = true;
                        console.log("DB 접근 권한 인증 완료:", user.uid);
                        startDataSync();
                    }
                });
            } catch (err) {
                console.error("인증 오류:", err);
                showToast("데이터베이스 연결 실패. 설정을 확인하세요.", "error");
            }
        }

        function startDataSync() {
            if (!auth.currentUser) return;

            // 💡 규칙: artifacts/{appId}/public/data/{coll} 경로 준수
            const eqRef = collection(db, 'artifacts', appId, 'public', 'data', 'equipments');
            const recRef = collection(db, 'artifacts', appId, 'public', 'data', 'records');

            // 설비 리스너
            onSnapshot(eqRef, (snapshot) => {
                window.equipments = snapshot.docs.map(d => ({ ...d.data(), id: d.id }));
                renderEquipmentList();
                renderSettingsEquipmentList();
                document.getElementById('eq-count').innerText = window.equipments.length;
            }, (err) => {
                console.error("설비 동기화 실패:", err);
                if(err.code === 'permission-denied') showToast("데이터 읽기 권한이 없습니다.", "error");
            });

            // 기록 리스너
            onSnapshot(recRef, (snapshot) => {
                window.records = snapshot.docs.map(d => d.data()).sort((a, b) => new Date(b.date) - new Date(a.date));
                renderHistory();
            }, (err) => {
                console.error("기록 동기화 실패:", err);
            });
        }

        function renderInputFields() {
            const targets = ['Motor', 'Gearbox', '본체', 'Oil Pump'];
            const vibContainer = document.getElementById('vibration-inputs');
            const heatContainer = document.getElementById('heating-inputs');
            if (vibContainer.innerHTML) return; 

            targets.forEach(target => {
                vibContainer.innerHTML += `
                    <div class="relative"><input type="number" id="v-${target}" placeholder="${target}" class="w-full p-2 border rounded bg-slate-50 text-right pr-8 text-sm"><span class="absolute right-2 top-3 text-[10px] text-slate-400 font-bold">mm/s</span></div>
                `;
                heatContainer.innerHTML += `
                    <div class="relative"><input type="number" id="h-${target}" placeholder="${target}" class="w-full p-2 border rounded bg-slate-50 text-right pr-8 text-sm"><span class="absolute right-2 top-3 text-[10px] text-slate-400 font-bold">°C</span></div>
                `;
            });
        }

        window.handleLogin = () => {
            const name = document.getElementById('inspector-name').value.trim();
            if(!name) return showToast("이름을 입력해주세요.");
            window.currentUser = name;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('display-user').innerText = name;
            showToast(`${name}님, 접속되었습니다.`);
        };

        window.renderEquipmentList = () => {
            const filterClass = document.getElementById('eq-class-filter').value;
            const search = document.getElementById('eq-search').value.toLowerCase();
            const listEl = document.getElementById('eq-list');
            
            const filtered = window.equipments.filter(eq => {
                const matchClass = filterClass === '전체' || eq.eqClass === filterClass;
                const matchSearch = String(eq.id).toLowerCase().includes(search) || String(eq.name).toLowerCase().includes(search);
                return matchClass && matchSearch;
            });

            listEl.innerHTML = filtered.length ? filtered.map(eq => `
                <div onclick="selectEquipment('${eq.id}', '${eq.name}', '${eq.eqClass}')" class="p-3 hover:bg-blue-50 cursor-pointer flex justify-between items-center transition-colors">
                    <div><span class="font-bold text-slate-700">[${eq.id}]</span> <span class="text-slate-500">${eq.name}</span></div>
                    <span class="text-[10px] bg-slate-200 px-1.5 py-0.5 rounded font-bold">${eq.eqClass}급</span>
                </div>
            `).join('') : '<p class="p-4 text-center text-slate-400 text-xs">등록된 설비가 없습니다.</p>';
        };

        window.selectEquipment = (id, name, eqClass) => {
            window.selectedEqId = id;
            window.selectedEqName = name;
            window.selectedEqClass = eqClass;
            document.getElementById('eq-list').classList.add('hidden');
            document.getElementById('selected-eq-info').classList.remove('hidden');
            document.getElementById('selected-text').innerText = `[${id}] ${name} (${eqClass}급)`;
        };

        window.clearSelection = () => {
            window.selectedEqId = null;
            document.getElementById('eq-list').classList.remove('hidden');
            document.getElementById('selected-eq-info').classList.add('hidden');
        };

        window.handlePhotoUpload = async (input) => {
            if(!input.files || !input.files[0]) return;
            const file = input.files[0];
            showToast("사진 압축 중...");
            
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 800;
                    let w = img.width, h = img.height;
                    if(w > MAX) { h = h * (MAX/w); w = MAX; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    window.photos.push(canvas.toDataURL('image/jpeg', 0.7));
                    renderPhotoPreview();
                };
            };
        };

        window.renderPhotoPreview = () => {
            const container = document.getElementById('photo-preview');
            container.innerHTML = window.photos.map((p, i) => `
                <div class="relative">
                    <img src="${p}" class="w-full h-24 object-cover rounded-lg border shadow-sm">
                    <button onclick="removePhoto(${i})" class="absolute top-1 right-1 bg-black/50 text-white rounded-full p-1"><i data-lucide="x" class="w-3 h-3"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        };

        window.removePhoto = (i) => { window.photos.splice(i, 1); renderPhotoPreview(); };

        window.saveRecord = async () => {
            if(!auth.currentUser) return showToast("DB 연결 중...", "error");
            if(!window.selectedEqId) return showToast("설비를 선택하세요.", "error");

            const recordId = "REC_" + Date.now();
            const vibration = {};
            const heating = {};
            ['Motor', 'Gearbox', '본체', 'Oil Pump'].forEach(t => {
                vibration[t] = document.getElementById(`v-${t}`).value;
                heating[t] = document.getElementById(`h-${t}`).value;
            });

            const data = {
                id: recordId,
                equipmentId: window.selectedEqId,
                equipmentName: window.selectedEqName,
                eqClass: window.selectedEqClass,
                inspector: window.currentUser,
                date: new Date().toISOString(),
                vibration,
                heating,
                oil: { level: document.getElementById('oil-level').value, leak: document.getElementById('oil-leak').value },
                remarks: document.getElementById('remarks').value,
                photos: window.photos
            };

            try {
                showToast("클라우드 저장 중...");
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'records', recordId), data);
                showToast("저장 성공!");
                clearForm();
                switchTab('history');
            } catch(e) {
                console.error(e);
                showToast("저장 권한이 없습니다.", "error");
            }
        };

        function clearForm() {
            clearSelection();
            ['Motor', 'Gearbox', '본체', 'Oil Pump'].forEach(t => {
                document.getElementById(`v-${t}`).value = '';
                document.getElementById(`h-${t}`).value = '';
            });
            document.getElementById('remarks').value = '';
            window.photos = [];
            renderPhotoPreview();
        }

        window.renderHistory = () => {
            const container = document.getElementById('history-container');
            container.innerHTML = window.records.map(r => `
                <div class="bg-white p-4 rounded-xl border shadow-sm space-y-3">
                    <div class="flex justify-between items-start border-b pb-2">
                        <div>
                            <div class="flex items-center space-x-2">
                                <span class="text-[10px] bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded font-bold">${r.eqClass}급</span>
                                <h4 class="font-bold text-slate-800">[${r.equipmentId}]</h4>
                            </div>
                            <p class="text-xs text-slate-500 mt-1">${r.equipmentName}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-slate-400 font-bold">${new Date(r.date).toLocaleString('ko-KR')}</p>
                            <span class="text-[10px] font-bold text-slate-600 bg-slate-100 px-2 py-0.5 rounded">${r.inspector}</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-2 text-[10px]">
                        <div class="bg-slate-50 p-2 rounded">
                            <p class="font-bold text-slate-400 mb-1">진동</p>
                            ${Object.keys(r.vibration).map(k => r.vibration[k] ? `<p>${k}: <b>${r.vibration[k]}</b></p>` : '').join('')}
                        </div>
                        <div class="bg-slate-50 p-2 rounded">
                            <p class="font-bold text-slate-400 mb-1">발열</p>
                            ${Object.keys(r.heating).map(k => r.heating[k] ? `<p>${k}: <b>${r.heating[k]}</b></p>` : '').join('')}
                        </div>
                        <div class="bg-slate-50 p-2 rounded">
                            <p class="font-bold text-slate-400 mb-1">오일</p>
                            <p>L: <b>${r.oil.level}</b></p>
                            <p>K: <b class="${r.oil.leak === '누유' ? 'text-rose-600' : ''}">${r.oil.leak}</b></p>
                        </div>
                    </div>
                    ${r.remarks ? `<p class="text-xs bg-amber-50 p-2 rounded text-slate-600 border border-amber-100 italic">"${r.remarks}"</p>` : ''}
                </div>
            `).join('');
        };

        window.addEquipment = async () => {
            if (!auth.currentUser) return showToast("DB 연결 중...", "error");
            const id = document.getElementById('new-eq-id').value.trim().replace(/[^a-zA-Z0-9_-]/g, '_');
            const name = document.getElementById('new-eq-name').value.trim();
            const eqClass = document.getElementById('new-eq-class').value;
            if(!id || !name) return showToast("정보를 모두 입력하세요.");
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'equipments', id), { id, name, eqClass });
                document.getElementById('new-eq-id').value = '';
                document.getElementById('new-eq-name').value = '';
                showToast("설비 등록 성공!");
            } catch(e) { showToast("등록 권한이 없습니다.", "error"); }
        };

        window.renderSettingsEquipmentList = () => {
            const el = document.getElementById('settings-eq-list');
            el.innerHTML = window.equipments.map(eq => `
                <div class="flex justify-between items-center p-2">
                    <span><b>[${eq.id}]</b> ${eq.name}</span>
                    <button onclick="deleteEq('${eq.id}')" class="text-rose-400 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        };

        window.deleteEq = async (id) => {
            if(!confirm("설비를 삭제하시겠습니까?")) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'equipments', id));
                showToast("삭제되었습니다.");
            } catch(e) { showToast("삭제 권한이 없습니다.", "error"); }
        };

        window.switchTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => {
                const btnTab = b.getAttribute('data-tab');
                if(btnTab === tabId) b.classList.replace('text-slate-400', 'text-blue-700');
                else b.classList.replace('text-blue-700', 'text-slate-400');
            });
        };

        window.showToast = (msg, type = 'success') => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.backgroundColor = type === 'error' ? '#ef4444' : '#1e293b';
            t.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 2500);
        };

        window.downloadExcel = () => {
            const headers = ["점검일시", "ID", "설비명", "점검자", "진동(Motor)", "발열(Motor)", "오일", "리크", "특이사항"];
            const rows = window.records.map(r => [
                new Date(r.date).toLocaleString(), r.equipmentId, r.equipmentName, r.inspector,
                r.vibration.Motor, r.heating.Motor, r.oil.level, r.oil.leak, r.remarks
            ]);
            const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "점검기록");
            XLSX.writeFile(wb, `점검데이터_${new Date().toISOString().slice(0,10)}.xlsx`);
        };

        window.logout = () => { location.reload(); };
    </script>
</body>
</html>
