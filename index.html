<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 설비 P.M 시스템</title>
    
    <!-- 지도(Import Map): 라이브러리 경로 안내 -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
    </script>

    <!-- 스타일 및 번역기 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 유틸리티 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
        .active-scale:active { transform: scale(0.97); transition: transform 0.1s; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            ClipboardCheck, History, Activity, Volume2, Flame, Droplet, 
            Save, User, Wrench, CheckCircle2, AlertTriangle, CheckSquare, Square, 
            Settings, LogOut, Plus, Trash2, Clock, Edit2, Upload, Download, Camera, 
            X, Calendar, Search, FileSpreadsheet, Loader2, ShieldAlert, ChevronRight
        } from 'lucide-react';

        // Firebase 라이브러리
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // ==========================================
        // 🔑 [사용자님의 파이어베이스 고유 설정값]
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCzTEKN9djNzuXwFUCrjfhfMXi5By25lwE",
            authDomain: "smart-pm-system.firebaseapp.com",
            projectId: "smart-pm-system",
            storageBucket: "smart-pm-system.firebasestorage.app",
            messagingSenderId: "670061026122",
            appId: "1:670061026122:web:b79aa67a686e2ef204bfb3",
            measurementId: "G-VM7ENYM6EP"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'smart-pm-system-app';

        // --- 구성 요소들 (App 컴포넌트 외부 정의로 안정성 확보) ---

        const LoginScreen = ({ onLogin }) => {
            const [name, setName] = useState('');
            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4">
                    <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm border border-slate-200">
                        <div className="flex justify-center mb-6">
                            <div className="bg-blue-600 p-4 rounded-2xl shadow-lg shadow-blue-200">
                                <Wrench className="w-8 h-8 text-white" />
                            </div>
                        </div>
                        <h1 className="text-2xl font-bold text-center text-slate-800 mb-2 tracking-tight">스마트 P.M 시스템</h1>
                        <p className="text-center text-sm text-slate-400 mb-8">성함을 입력하고 점검을 시작하세요.</p>
                        <div className="space-y-4">
                            <input 
                                type="text" 
                                placeholder="점검자 성함" 
                                className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-center font-semibold text-slate-700 transition-all" 
                                value={name} 
                                onChange={e => setName(e.target.value)} 
                                onKeyDown={e => e.key === 'Enter' && name.trim() && onLogin(name.trim())} 
                            />
                            <button 
                                onClick={() => name.trim() && onLogin(name.trim())} 
                                className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-100 transition-all active:scale-95 flex items-center justify-center gap-2"
                            >
                                점검 시작하기 <ChevronRight className="w-5 h-5" />
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const CategorySection = ({ title, icon: Icon, items, type, data, onChange, unit }) => {
            return (
                <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 mb-5 transition-all">
                    <div className="flex items-center mb-5 pb-2 border-b border-slate-50">
                        <div className="p-2 bg-slate-50 rounded-lg mr-3">
                            <Icon className="w-5 h-5 text-blue-600" />
                        </div>
                        <span className="font-bold text-slate-800 text-lg tracking-tight">{title}</span>
                    </div>
                    <div className="space-y-3">
                        {items.map(item => {
                            const isSelected = data[item] !== undefined;
                            return (
                                <div key={item} className={`flex flex-col sm:flex-row sm:items-center gap-3 p-3 rounded-xl border transition-all ${isSelected ? 'bg-blue-50/40 border-blue-200 ring-1 ring-blue-100' : 'bg-slate-50 border-slate-100'}`}>
                                    <button 
                                        className="flex items-center flex-1 text-left active:opacity-70 transition-opacity" 
                                        onClick={() => {
                                            const newData = { ...data };
                                            if (isSelected) delete newData[item];
                                            else newData[item] = type === 'numeric' ? '' : '정상';
                                            onChange(newData);
                                        }}
                                    >
                                        {isSelected ? <CheckSquare className="w-6 h-6 text-blue-600 mr-3 shrink-0"/> : <Square className="w-6 h-6 text-slate-300 mr-3 shrink-0"/>}
                                        <span className={`font-bold ${isSelected ? 'text-blue-900' : 'text-slate-500'}`}>{item}</span>
                                    </button>
                                    
                                    {isSelected && (
                                        <div className="pl-9 sm:pl-0 flex-1 flex justify-end animate-in fade-in duration-300 slide-in-from-right-2">
                                            {type === 'numeric' ? (
                                                <div className="relative w-full sm:w-36">
                                                    <input 
                                                        type="number" 
                                                        className="w-full p-2.5 text-sm border-2 border-blue-200 rounded-xl outline-none text-right pr-10 bg-white font-bold text-blue-800 focus:border-blue-500 transition-colors"
                                                        placeholder="0.0" value={data[item]} onChange={(e) => onChange({ ...data, [item]: e.target.value })}
                                                    />
                                                    {unit && <span className="absolute right-3 top-2.5 text-xs text-blue-400 font-bold">{unit}</span>}
                                                </div>
                                            ) : (
                                                <div className="flex w-full sm:w-auto bg-white rounded-xl border-2 border-blue-200 overflow-hidden shadow-sm">
                                                    {['정상', '주의', '이상'].map(status => (
                                                        <button 
                                                            key={status} 
                                                            onClick={() => onChange({ ...data, [item]: status })} 
                                                            className={`flex-1 sm:px-4 py-2 text-xs font-bold transition-all ${data[item] === status ? (status === '정상' ? 'bg-emerald-500 text-white' : status === '주의' ? 'bg-amber-500 text-white' : 'bg-rose-500 text-white') : 'text-slate-400 hover:bg-slate-50'}`}
                                                        >
                                                            {status}
                                                        </button>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const OilSection = ({ data, onChange }) => {
            const update = (field, value) => onChange({ ...data, [field]: value });
            const Row = ({ label, field, options }) => (
                <div className="flex flex-col sm:flex-row sm:items-center justify-between p-3.5 bg-slate-50 rounded-xl border border-slate-100 gap-3">
                    <span className="font-bold text-slate-700 text-sm pl-1">{label}</span>
                    <div className="flex w-full sm:w-auto bg-white rounded-xl border-2 border-blue-200 overflow-hidden shadow-sm">
                        {options.map((opt) => {
                            const isActive = data[field] === opt;
                            let colorClass = "text-slate-400 hover:bg-slate-50";
                            if (isActive) {
                                if (opt === '양호' || opt === '정상') colorClass = "bg-emerald-500 text-white font-bold";
                                else if (opt === '보충' || opt === '주의' || opt === '변색') colorClass = "bg-amber-500 text-white font-bold";
                                else colorClass = "bg-rose-500 text-white font-bold";
                            }
                            return (
                                <button key={opt} onClick={() => update(field, opt)} className={`flex-1 sm:px-5 py-2.5 text-xs transition-all ${colorClass}`}>{opt}</button>
                            );
                        })}
                    </div>
                </div>
            );
            return (
                <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 mb-5">
                    <div className="flex items-center mb-5 pb-2 border-b border-slate-50">
                        <div className="p-2 bg-slate-50 rounded-lg mr-3"><Droplet className="w-5 h-5 text-blue-600" /></div>
                        <span className="font-bold text-slate-800 text-lg tracking-tight">오일 상태 점검</span>
                    </div>
                    <div className="space-y-3">
                        <Row label="오일 레벨" field="level" options={['양호', '보충', '부족']} />
                        <Row label="변색 유무" field="discoloration" options={['정상', '변색']} />
                        <Row label="Leak (누유)" field="leak" options={['정상', '누유']} />
                    </div>
                </div>
            );
        };

        const EquipmentSelector = ({ equipments, selectedId, onSelect, selectedClass, onClassChange }) => {
            const [search, setSearch] = useState('');
            const classes = ['전체', 'A', 'B', 'C', 'D'];
            const filtered = equipments.filter(eq => {
                const matchClass = selectedClass === '전체' || eq.eqClass === selectedClass;
                const matchSearch = String(eq.id).toLowerCase().includes(search.toLowerCase()) || 
                                  String(eq.name).toLowerCase().includes(search.toLowerCase());
                return matchClass && matchSearch;
            }).slice(0, 30);

            if (selectedId) {
                const eq = equipments.find(e => e.id === selectedId);
                return (
                    <div className="flex justify-between items-center bg-blue-600 p-4 rounded-2xl shadow-lg shadow-blue-100 animate-in zoom-in-95 duration-200">
                        <div className="truncate pr-2">
                            <div className="text-[10px] text-blue-200 font-bold mb-0.5">{eq?.eqClass}급 설비</div>
                            <div className="flex items-center">
                                <span className="font-black text-white mr-2">[{eq?.id}]</span>
                                <span className="text-white font-medium truncate">{eq?.name}</span>
                            </div>
                        </div>
                        <button onClick={() => onSelect('')} className="shrink-0 text-xs bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-xl font-bold backdrop-blur-sm border border-white/20 transition-all">설비 변경</button>
                    </div>
                );
            }

            return (
                <div className="bg-slate-50 p-4 rounded-2xl border-2 border-slate-200 flex flex-col gap-4">
                    <div className="flex bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm p-1">
                        {classes.map(c => (
                            <button key={c} onClick={() => onClassChange(c)} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${selectedClass === c ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}>{c}</button>
                        ))}
                    </div>
                    <div className="relative">
                        <Search className="w-4 h-4 absolute left-3 top-3.5 text-slate-400" />
                        <input type="text" placeholder="설비명 또는 ID로 검색..." className="w-full pl-10 p-3 bg-white border border-slate-200 rounded-xl outline-none text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all" value={search} onChange={e => setSearch(e.target.value)} />
                    </div>
                    <div className="max-h-48 overflow-y-auto border border-slate-200 rounded-xl bg-white divide-y divide-slate-100 shadow-inner">
                        {filtered.length > 0 ? filtered.map(eq => (
                            <button key={eq.id} onClick={() => onSelect(eq.id)} className="w-full text-left p-3.5 hover:bg-blue-50 transition-colors flex justify-between items-center group">
                                <div className="truncate"><span className="font-extrabold text-slate-700 group-hover:text-blue-700 mr-2 transition-colors">[{eq.id}]</span><span className="text-sm text-slate-500 group-hover:text-blue-600 transition-colors">{eq.name}</span></div>
                                <span className={`text-[10px] px-2 py-0.5 rounded-full font-black shadow-sm ${eq.eqClass === 'A' ? 'bg-rose-100 text-rose-600' : 'bg-slate-100 text-slate-500'}`}>{eq.eqClass}</span>
                            </button>
                        )) : <div className="p-8 text-center text-sm text-slate-400 font-medium italic">일치하는 설비가 없습니다.</div>}
                    </div>
                </div>
            );
        };

        // --- 메인 앱 로직 ---

        function App() {
            const [user, setUser] = useState(null);
            const [currentUser, setCurrentUser] = useState(''); 
            const [isFirebaseLoading, setIsFirebaseLoading] = useState(true);
            const [permissionError, setPermissionError] = useState(false);
            const [equipments, setEquipments] = useState([]);
            const [records, setRecords] = useState([]);
            const [activeTab, setActiveTab] = useState('form');
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
            const [formEqClass, setFormEqClass] = useState('전체');
            const [historyEqClass, setHistoryEqClass] = useState('전체');
            const [historyEqId, setHistoryEqId] = useState('');
            const [newEqId, setNewEqId] = useState('');
            const [newEqName, setNewEqName] = useState('');
            const [newEqClass, setNewEqClass] = useState('C');
            
            // 💡 handleInputChange 함수를 최상단에 정의하여 ReferenceError 방지
            const [formData, setFormData] = useState({ 
                equipmentId: '', 
                date: new Date().toISOString().slice(0, 16), 
                vibration: {}, 
                noise: {}, 
                heating: {}, 
                oil: { level: '양호', discoloration: '정상', leak: '정상' }, 
                remarks: '' 
            });

            // 입력값 변경 통합 핸들러
            function handleInputChange(field, value) {
                setFormData(prev => ({ ...prev, [field]: value }));
            }

            const showMessage = (msg, type = 'success') => {
                setToast({ show: true, message: String(msg), type });
                setTimeout(() => setToast(p => ({ ...p, show: false })), 3000);
            };

            // Firebase 초기 인증
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } catch (e) {
                                await signInAnonymously(auth);
                            }
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        setIsFirebaseLoading(false);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (authUser) => {
                    setUser(authUser);
                    if (!authUser) setIsFirebaseLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // Firebase 데이터 연동
            useEffect(() => {
                if (!user) return;
                
                const eqRef = collection(db, 'artifacts', appId, 'public', 'data', 'equipments');
                const unsubEq = onSnapshot(eqRef, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    if (data.length === 0) {
                        INITIAL_EQUIPMENT_LIST.forEach(eq => setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'equipments', eq.id), eq));
                    } else {
                        setEquipments(data);
                    }
                    setIsFirebaseLoading(false);
                }, (error) => {
                    if (error.code === 'permission-denied') setPermissionError(true);
                    setIsFirebaseLoading(false);
                });

                const recRef = collection(db, 'artifacts', appId, 'public', 'data', 'records');
                const unsubRec = onSnapshot(recRef, (snapshot) => {
                    setRecords(snapshot.docs.map(doc => doc.data()));
                }, (error) => { if (error.code === 'permission-denied') setPermissionError(true); });

                return () => { unsubEq(); unsubRec(); };
            }, [user]);

            const handleEquipmentChange = (id) => {
                if (!id) { 
                    setFormData({ ...formData, equipmentId: '', vibration: {}, noise: {}, heating: {}, remarks: '' }); 
                    return; 
                }
                const last = [...records].sort((a,b) => new Date(b.date) - new Date(a.date)).find(r => r.equipmentId === id);
                if (last) {
                    const clear = (obj) => Object.fromEntries(Object.keys(obj || {}).map(k => [k, '']));
                    setFormData({ 
                        ...formData, 
                        equipmentId: id, 
                        vibration: clear(last.vibration), 
                        heating: clear(last.heating), 
                        noise: last.noise || {}, 
                        oil: last.oil || { level: '양호', discoloration: '정상', leak: '정상' } 
                    });
                } else setFormData({ ...formData, equipmentId: id });
            };

            const handleSave = async () => {
                if (!formData.equipmentId) return showMessage('설비를 먼저 선택하세요.', 'error');
                const id = Date.now().toString();
                const eq = equipments.find(e => e.id === formData.equipmentId);
                const data = { 
                    ...formData, 
                    id, 
                    inspector: currentUser, 
                    equipmentName: eq?.name, 
                    eqClass: eq?.eqClass, 
                    displayDate: new Date(formData.date).toLocaleString('ko-KR') 
                };
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'records', id), data);
                    showMessage('저장되었습니다!'); 
                    setFormData({ ...formData, equipmentId: '', vibration: {}, noise: {}, heating: {}, remarks: '' }); 
                    setActiveTab('history');
                } catch (e) { showMessage('저장 실패. 권한을 확인하세요.', 'error'); }
            };

            const handleAddEquipment = async () => {
                const trimmedId = String(newEqId).trim().replace(/[^a-zA-Z0-9_-]/g, '_');
                const trimmedName = String(newEqName).trim();
                if (!trimmedId || !trimmedName) return showMessage('모든 항목을 입력하세요.', 'error');
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'equipments', trimmedId), { id: trimmedId, name: trimmedName, eqClass: newEqClass });
                    setNewEqId(''); setNewEqName(''); showMessage('설비가 등록되었습니다.');
                } catch (err) { if (err.code === 'permission-denied') setPermissionError(true); }
            };

            const filteredRecords = useMemo(() => {
                let res = records;
                if (historyEqClass !== '전체') res = res.filter(r => r.eqClass === historyEqClass);
                if (historyEqId) res = res.filter(r => r.equipmentId === historyEqId);
                return res.sort((a,b) => new Date(b.date) - new Date(a.date));
            }, [records, historyEqClass, historyEqId]);

            if (permissionError) return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-white p-10 rounded-3xl shadow-2xl max-w-md text-center border-t-8 border-rose-500">
                        <ShieldAlert className="w-16 h-16 text-rose-500 mx-auto mb-6" />
                        <h1 className="text-2xl font-bold mb-4 text-slate-800 tracking-tight">서버 권한 오류</h1>
                        <p className="text-sm text-slate-500 mb-8 leading-relaxed">파이어베이스 <b>Rules(규칙)</b> 메뉴에서 <br/> <b>allow read, write: if true;</b> 로 변경 후 <br/> <b>게시(Publish)</b> 버튼을 꼭 눌러주세요!</p>
                        <button onClick={() => window.location.reload()} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg transition-all active:scale-95">설정 완료 후 다시 시도하기</button>
                    </div>
                </div>
            );

            if (!currentUser) return <LoginScreen onLogin={setCurrentUser} />;
            if (isFirebaseLoading) return <div className="min-h-screen flex items-center justify-center bg-white"><div className="flex flex-col items-center gap-4"><Loader2 className="w-10 h-10 text-blue-600 animate-spin" /><p className="font-bold text-slate-400">서버 데이터 동기화 중...</p></div></div>;

            return (
                <div className="min-h-screen bg-slate-50 max-w-md mx-auto shadow-2xl flex flex-col relative overflow-hidden ring-1 ring-slate-200">
                    <header className="bg-white text-slate-800 p-5 sticky top-0 z-20 flex justify-between items-center border-b border-slate-100 shadow-sm">
                        <div className="flex items-center gap-2.5">
                            <div className="p-2 bg-blue-600 rounded-xl"><Wrench className="w-5 h-5 text-white" /></div>
                            <h1 className="text-xl font-black tracking-tighter text-slate-900">PM SMART</h1>
                        </div>
                        <div className="flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-full border border-slate-200 shadow-inner">
                            <User className="w-3.5 h-3.5 text-slate-500" />
                            <span className="text-xs font-black text-slate-700">{currentUser}</span>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto p-5 pb-32">
                        {activeTab === 'form' && (
                            <div className="space-y-4 animate-in fade-in duration-300">
                                <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 mb-6">
                                    <label className="block text-xs font-black text-blue-600 mb-3 uppercase tracking-widest">1. 점검 설비 선택</label>
                                    <EquipmentSelector equipments={equipments} selectedId={formData.equipmentId} onSelect={handleEquipmentChange} selectedClass={formEqClass} onClassChange={setFormEqClass} />
                                    <label className="block text-xs font-black text-blue-600 mt-6 mb-3 uppercase tracking-widest">2. 점검 일시</label>
                                    <div className="relative"><Clock className="w-4 h-4 absolute left-4 top-4 text-slate-400" /><input type="datetime-local" className="w-full pl-11 p-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500" value={formData.date} onChange={e => handleInputChange('date', e.target.value)} /></div>
                                </div>
                                <CategorySection title="진동 점검 (mm/s)" icon={Activity} type="numeric" unit="mm/s" items={['Motor', 'Gearbox', '본체', 'Oil Pump']} data={formData.vibration} onChange={v => handleInputChange('vibration', v)} />
                                <CategorySection title="이음 점검" icon={Volume2} type="status" items={['Motor', 'Gearbox', '본체', 'Bearing']} data={formData.noise} onChange={n => handleInputChange('noise', n)} />
                                <CategorySection title="발열 점검 (°C)" icon={Flame} type="numeric" unit="°C" items={['Motor', 'Gearbox', '본체', 'Bearing']} data={formData.heating} onChange={h => handleInputChange('heating', h)} />
                                <OilSection data={formData.oil} onChange={o => handleInputChange('oil', o)} />
                                <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 mb-10">
                                    <label className="block text-xs font-black text-blue-600 mb-3 uppercase tracking-widest">추가 메모</label>
                                    <textarea rows="3" placeholder="특이사항 및 조치내역을 자유롭게 입력하세요." className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all font-medium" value={formData.remarks} onChange={(e) => handleInputChange('remarks', e.target.value)}></textarea>
                                    <button onClick={handleSave} className="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-black py-4.5 rounded-2xl shadow-xl shadow-blue-200 flex items-center justify-center gap-3 transition-all active:scale-95 text-lg"><Save className="w-6 h-6" /> 점검 데이터 전송</button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-4 animate-in fade-in duration-300">
                                <EquipmentSelector equipments={equipments} selectedId={historyEqId} onSelect={setHistoryEqId} selectedClass={historyEqClass} onClassChange={setHistoryEqClass} />
                                <div className="flex bg-slate-200/50 p-1.5 rounded-2xl border border-slate-200">
                                    <button onClick={() => showMessage('준비 중인 기능입니다.')} className="flex-1 py-2 text-xs font-bold rounded-xl bg-white shadow-md text-blue-700">리스트 뷰</button>
                                    <button onClick={() => showMessage('준비 중인 기능입니다.')} className="flex-1 py-2 text-xs font-bold rounded-xl text-slate-500 hover:bg-white/50">보고서 형태</button>
                                </div>
                                <div className="space-y-3">
                                    {filteredRecords.map(r => (
                                        <div key={r.id} className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow">
                                            <div className="flex justify-between items-start mb-4 border-b border-slate-50 pb-3">
                                                <div className="flex flex-col"><span className="text-[10px] font-black text-blue-500 mb-0.5 tracking-tighter uppercase">{r.eqClass}급 설비</span><h3 className="font-extrabold text-slate-800 text-base leading-none">[{r.equipmentId}] {r.equipmentName}</h3></div>
                                                <span className="text-[10px] text-slate-400 font-bold bg-slate-50 px-2 py-1 rounded-lg">{r.displayDate}</span>
                                            </div>
                                            <div className="space-y-2.5">
                                                <div className="flex flex-wrap gap-2">{Object.entries(r.vibration || {}).map(([k,v]) => v && <span key={k} className="text-[10px] bg-blue-50 text-blue-700 px-2.5 py-1 rounded-full font-bold border border-blue-100">{k}: {v}</span>)}</div>
                                                <div className="flex flex-wrap gap-2">{Object.entries(r.noise || {}).map(([k,v]) => v && <span key={k} className={`text-[10px] px-2.5 py-1 rounded-full font-bold border ${v==='정상'?'bg-emerald-50 text-emerald-700 border-emerald-100':'bg-rose-50 text-rose-700 border-rose-100'}`}>{k}: {v}</span>)}</div>
                                                {r.remarks && <div className="mt-3 p-3 bg-amber-50 rounded-2xl border border-amber-100 text-[11px] text-amber-900 font-medium leading-relaxed italic">"{r.remarks}"</div>}
                                            </div>
                                        </div>
                                    ))}
                                    {filteredRecords.length === 0 && <div className="p-20 text-center flex flex-col items-center gap-4"><History className="w-12 h-12 text-slate-200" /><p className="text-sm font-bold text-slate-300 tracking-tight">저장된 점검 기록이 없습니다.</p></div>}
                                </div>
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="space-y-6 animate-in fade-in duration-300">
                                <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                    <h3 className="font-black text-slate-800 mb-5 flex items-center gap-2"><Settings className="w-5 h-5 text-blue-600" /> 신규 설비 등록</h3>
                                    <div className="space-y-4">
                                        <div className="flex gap-3">
                                            <input type="text" placeholder="설비 ID (P-101)" className="flex-[3] p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold text-slate-700 focus:ring-2 focus:ring-blue-500" value={newEqId} onChange={e=>setNewEqId(e.target.value)} />
                                            <select className="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-black text-blue-600" value={newEqClass} onChange={e=>setNewEqClass(e.target.value)}><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select>
                                        </div>
                                        <input type="text" placeholder="설비명 (가압 펌프 A)" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold text-slate-700 focus:ring-2 focus:ring-blue-500" value={newEqName} onChange={e=>setNewEqName(e.target.value)} />
                                        <button onClick={handleAddEquipment} className="w-full bg-slate-800 hover:bg-slate-900 text-white font-black py-4 rounded-2xl shadow-xl transition-all active:scale-95 flex items-center justify-center gap-2"><Plus className="w-5 h-5" /> 리스트에 설비 추가</button>
                                    </div>
                                </div>
                                <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm max-h-[300px] overflow-y-auto divide-y divide-slate-50">
                                    <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-3">등록된 설비 리스트</h4>
                                    {equipments.map(eq => (
                                        <div key={eq.id} className="flex justify-between items-center py-3.5">
                                            <div className="flex flex-col"><span className="text-[9px] font-black text-slate-400 tracking-tighter uppercase">{eq.eqClass} CLASS</span><span className="text-sm font-extrabold text-slate-700"><b>[{eq.id}]</b> {eq.name}</span></div>
                                            <button onClick={() => confirm('설비를 영구 삭제할까요?') && deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'equipments', eq.id))} className="p-2 text-slate-300 hover:text-rose-500 transition-colors active:scale-90"><Trash2 className="w-4 h-4" /></button>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => setCurrentUser('')} className="w-full py-4.5 rounded-2xl text-slate-400 font-black border-2 border-slate-100 hover:bg-slate-100 transition-all flex items-center justify-center gap-2"><LogOut className="w-5 h-5" /> 시스템 로그아웃</button>
                            </div>
                        )}
                    </main>

                    {toast.show && (
                        <div className={`fixed top-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-3xl shadow-2xl text-white text-sm font-black flex items-center z-[100] animate-in slide-in-from-top-10 duration-500 ${toast.type === 'error' ? 'bg-rose-500' : 'bg-slate-900/90 backdrop-blur-md'}`}>
                            {toast.type === 'error' ? <AlertTriangle className="w-5 h-5 mr-3" /> : <CheckCircle2 className="w-5 h-5 text-emerald-400 mr-3" />}
                            {toast.message}
                        </div>
                    )}

                    <nav className="bg-white/80 backdrop-blur-xl border-t border-slate-100 fixed bottom-0 w-full max-w-md flex justify-around p-3 pb-8 shadow-[0_-10px_40px_rgba(0,0,0,0.04)] rounded-t-[40px] z-50">
                        <button className={`flex flex-col items-center gap-1.5 p-3 rounded-2xl transition-all ${activeTab === 'form' ? 'text-blue-600 scale-110' : 'text-slate-300'}`} onClick={() => setActiveTab('form')}><ClipboardCheck className="w-6 h-6" /><span className="text-[10px] font-black">점검하기</span></button>
                        <button className={`flex flex-col items-center gap-1.5 p-3 rounded-2xl transition-all ${activeTab === 'history' ? 'text-blue-600 scale-110' : 'text-slate-300'}`} onClick={() => setActiveTab('history')}><History className="w-6 h-6" /><span className="text-[10px] font-black">기록보기</span></button>
                        <button className={`flex flex-col items-center gap-1.5 p-3 rounded-2xl transition-all ${activeTab === 'settings' ? 'text-blue-600 scale-110' : 'text-slate-300'}`} onClick={() => setActiveTab('settings')}><Settings className="w-6 h-6" /><span className="text-[10px] font-black">설정관리</span></button>
                    </nav>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
