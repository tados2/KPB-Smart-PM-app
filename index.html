        const firebaseConfig = {

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800; 
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) { height = height * (MAX_WIDTH / width); width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                    };
                };
            });
        };

        // --- 3. 하위 컴포넌트 ---

        const LoginScreen = ({ onLogin }) => {

        const CategorySection = ({ title, icon: Icon, items, data, onChange, unit, type }) => {

                        {activeItems.map(item => (

            const optionsMap = { level: ['양호', '보충', '부족'], discoloration: ['정상', '변색'], leak: ['정상', '누유'] };
            return (
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 mb-6 transition-all hover:border-blue-100">
                    <div className="flex items-center mb-4 border-b border-slate-50 pb-2"><Droplet className="w-5 h-5 text-slate-500 mr-2" /><span className="font-bold text-slate-800 font-black">오일 상태 점검</span></div>
                    <div className="space-y-3">

                                <div className="flex w-full sm:w-auto bg-white rounded border border-blue-200 overflow-hidden shadow-sm">
                                    {optionsMap[field].map((opt) => (

                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const ExtraSection = ({ itemsToShow, data, onChange }) => {
            return (
                <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 mb-6 transition-all hover:border-blue-100">
                    <div className="flex items-center mb-4 border-b border-slate-50 pb-2"><Zap className="w-5 h-5 text-slate-500 mr-2" /><span className="font-bold text-slate-800 font-black">기타 중요 항목</span></div>
                    <div className="space-y-3">
                        {itemsToShow.includes('amphere') && (

                                <div className="relative w-full sm:w-40"><input type="number" placeholder="0.0" className="unit-input w-full p-2.5 text-sm border border-blue-200 rounded-xl outline-none text-right bg-white font-bold text-blue-800 focus:ring-2 focus:ring-blue-500" value={data.amphere || ''} onChange={e => onChange({ ...data, amphere: e.target.value })} /><span className="absolute right-3 top-2.5 text-[10px] text-slate-400 font-black pointer-events-none">Amp</span></div>

                        )}

        function EquipmentSelector({ equipments, records, selectedId, onSelect, selectedClass, onClassChange, checkOverdue }) {
            const [search, setSearch] = useState('');
            const filtered = equipments.filter(eq => {
                const matchClass = selectedClass === '전체' || eq.eqClass === selectedClass;
                const matchSearch = String(eq.id || '').toLowerCase().includes(search.toLowerCase()) || String(eq.name || '').toLowerCase().includes(search.toLowerCase());

            });

            if (selectedId) {
                const eq = equipments.find(e => e.id === selectedId);
                return (
                    <div className="flex justify-between items-center bg-blue-50 p-3 rounded-lg border border-blue-200 shadow-sm animate-in fade-in">
                        <div className="truncate pr-2 flex items-center gap-2 font-bold"><span className="text-blue-800 font-black">[{eq?.id}]</span><span className="font-bold">{eq?.name}</span><span className="text-[9px] bg-blue-200 text-blue-800 px-1.5 py-0.5 rounded-full font-black">{eq?.eqClass}급</span></div>
                        <button onClick={() => onSelect('')} className="shrink-0 text-xs bg-white border border-blue-300 text-blue-600 px-3 py-2 rounded hover:bg-blue-100 transition-colors font-black shadow-sm">설비 변경</button>
                    </div>

            return (

                                </button>
                            );
                        }) : <div className="p-4 text-center text-xs text-slate-400 font-medium">검색 결과가 없습니다.</div>}
                    </div>
                </div>
            );
        }

        const TrendChart = ({ records, title, category, items, unit }) => {
            const validRecords = records.filter(r => Object.keys(r[category] || {}).length > 0);
            if (validRecords.length === 0) return null;
            const timeRecords = validRecords.map(r => ({ ...r, timestamp: new Date(String(r.date).replace(" ", "T")).getTime() })).sort((a, b) => a.timestamp - b.timestamp);
            const minTime = timeRecords[0].timestamp; const maxTime = timeRecords[timeRecords.length - 1].timestamp; const timeRange = maxTime - minTime || 1;
            let maxVal = 10; timeRecords.forEach(r => items.forEach(item => { const v = parseFloat(String(r[category][item])); if (!isNaN(v) && v > maxVal) maxVal = v; }));
            const plotMax = Math.ceil(maxVal / 5) * 5; 
            const width = 100, height = 50, colors = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6'];
            return (
                <div className="bg-white p-4 pb-8 rounded-xl border border-slate-200 shadow-sm mb-4 print:shadow-none print:border-slate-300">
                    <h4 className="font-bold text-slate-700 mb-1 text-sm font-black tracking-tight">{title} 트렌드 {unit && `(${unit})`}</h4>
                    <div className="relative w-full mt-2"><svg viewBox={`-15 -5 ${width + 20} ${height + 20}`} className="w-full h-auto overflow-visible">
                        {[0, 0.25, 0.5, 0.75, 1].map(v => { const y = height - (v * height); return <g key={v}><text x="-2" y={y + 1.5} fontSize="4" fill="#94a3b8" textAnchor="end">{Math.round(v * plotMax)}</text><line x1="0" y1={y} x2={width} y2={y} stroke="#f1f5f9" strokeWidth="0.5" /></g> })}
                        {items.map((item, i) => {
                            let d = ''; const points = [];
                            timeRecords.forEach(r => { const val = parseFloat(String(r[category][item])); if (!isNaN(val)) { const x = ((r.timestamp - minTime) / timeRange) * width; const y = height - (val / plotMax * height); points.push({x, y}); d += `${d ? ' L' : 'M'} ${x} ${y}`; } });
                            if (!d) return null;
                            return <g key={`chart-${item}`}><path d={d} fill="none" stroke={colors[i % colors.length]} strokeWidth="1" strokeLinejoin="round" />{points.map((p, idx) => <circle key={idx} cx={p.x} cy={p.y} r="0.8" fill={colors[i % colors.length]} />)}</g>
                        })}
                        <text x="0" y={height + 7} fontSize="4" fill="#94a3b8" textAnchor="start">{String(timeRecords[0].date).split('T')[0].slice(5)}</text>
                        {timeRecords.length > 1 && <text x={width} y={height + 7} fontSize="4" fill="#94a3b8" textAnchor="end">{String(timeRecords[timeRecords.length - 1].date).split('T')[0].slice(5)}</text>}
                    </svg></div>
                    <div className="flex flex-wrap gap-2 mt-4 justify-center">{items.map((item, i) => <span key={item} className="text-[8px] flex items-center text-slate-500 font-bold"><span className="w-1.5 h-1.5 rounded-full mr-1" style={{backgroundColor: colors[i % colors.length]}}></span>{item}</span>)}</div>
                </div>
            );
        };

        // --- 4. 메인 앱 컴포넌트 ---

        function App() {
            const [user, setUser] = useState(null);
            const [currentUser, setCurrentUser] = useState(''); 
            const [isFirebaseLoading, setIsFirebaseLoading] = useState(true);
            const [permissionError, setPermissionError] = useState(false);
            const [equipments, setEquipments] = useState([]);
            const [records, setRecords] = useState([]);
            const [activeTab, setActiveTab] = useState('form');
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
            
            // SETUP 상태
            const [newEqId, setNewEqId] = useState('');
            const [newEqName, setNewEqName] = useState('');
            const [newEqClass, setNewEqClass] = useState('C');
            const [newDefaultParts, setNewDefaultParts] = useState([]);
            const [newOilParts, setNewOilParts] = useState([]);
            const [newExtraParts, setNewExtraParts] = useState([]);
            const [setupEditMode, setSetupEditMode] = useState(false);

            // FORM/HISTORY 상태
            const [formEqClass, setFormEqClass] = useState('전체');
            const [historyEqClass, setHistoryEqClass] = useState('전체');
            const [historyEqId, setHistoryEqId] = useState('');
            const [historyView, setHistoryView] = useState('list'); 
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');

            const [formData, setFormData] = useState({ equipmentId: '', date: getCurrentDateTimeLocal(), runStatus: '가동 중', vibration: {}, noise: {}, heating: {}, oil: {}, extra: {}, remarks: '', photo: [] });
            const [editingId, setEditingId] = useState(null);
            const [photoModal, setPhotoModal] = useState(null);
            const [isGeneratingPDF, setIsGeneratingPDF] = useState(false);
            const [deleteModalState, setDeleteModalState] = useState({ isOpen: false, eqId: null, password: '', error: '' });

            const showMessage = (msg, type = 'success') => { setToast({ show: true, message: String(msg), type }); setTimeout(() => setToast(p => ({ ...p, show: false })), 3000); };

            const checkOverdue = useCallback((eq) => {
                if (eq.eqClass === 'C' || eq.eqClass === 'D') return false; 
                const eqRecords = records.filter(r => r.equipmentId === eq.id);
                if (eqRecords.length === 0) return true;
                const latest = new Date(eqRecords.sort((a,b) => new Date(b.date) - new Date(a.date))[0].date);
                const now = new Date();
                if (eq.eqClass === 'A') {
                    const startOfWeek = new Date(now);
                    startOfWeek.setDate(now.getDate() - now.getDay());
                    startOfWeek.setHours(0, 0, 0, 0);
                    return latest < startOfWeek;
                }
                if (eq.eqClass === 'B') {
                    const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
                    return latest < startOfMonth;
                }
                return false;
            }, [records]);

            const sortedEquipments = useMemo(() => {
                const weights = { 'A': 1, 'B': 2, 'C': 3, 'D': 4 };
                return [...equipments].sort((a, b) => {

                const nowTime = getCurrentDateTimeLocal();

                    const clearNum = (obj) => Object.fromEntries(Object.keys(obj || {}).map(k => [k, '']));

            const handleFileUpload = async (event) => {

                        const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                        for (let i = 1; i < rows.length; i++) {
                            const row = rows[i]; if (!row || row.length < 2) continue;

            const handleDownloadPDF = async (targetId) => {
                setIsGeneratingPDF(true); showMessage('PDF 생성 중...');
                try {
                    const targetElement = document.getElementById(targetId);
                    const originalStyle = targetElement.style.cssText;
                    targetElement.style.height = 'max-content';
                    targetElement.style.overflow = 'visible';

                    const canvas = await html2canvas(targetElement, { scale: 2, useCORS: true, backgroundColor: '#ffffff', scrollY: -window.scrollY });
                    
                    targetElement.style.cssText = originalStyle;

                    const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = pdf.internal.pageSize.getHeight();
                    const imgHeight = (canvas.height * pdfWidth) / canvas.width;
                    
                    let heightLeft = imgHeight; 
                    let position = 0;
                    
                    pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, position, pdfWidth, imgHeight); 
                    heightLeft -= pdfHeight;
                    
                    while (heightLeft > 0) { 
                        position = heightLeft - imgHeight; 
                        pdf.addPage(); 
                        pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, position, pdfWidth, imgHeight); 
                        heightLeft -= pdfHeight;

            if (permissionError) return <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100 text-center"><div className="bg-white p-10 rounded-3xl shadow-xl max-w-md"><ShieldAlert className="w-16 h-16 text-rose-500 mx-auto mb-6" /><h1 className="text-xl font-bold mb-4 text-slate-800 font-black">서버 보안 설정 필요</h1><p className="text-sm text-slate-500 mb-8 leading-relaxed">Firebase Database 규칙을 'allow read, write: if true;'로 수정해 주세요.</p><button onClick={() => window.location.reload()} className="w-full bg-blue-700 text-white py-4 rounded-2xl font-bold">새로고침</button></div></div>;

                                        </div>
                                        
                                        {/* 💡 [해결 1] 트렌드 대상 정보 헤더 추가 및 캡처 전용 컨테이너 명시 */}
                                        <div id="trend-view-container" className="bg-white p-6 pb-10 rounded-2xl shadow-sm border border-slate-200">

                                                <h2 className="text-xl font-black text-slate-900 tracking-tighter flex items-center gap-2"><TrendingUp className="w-5 h-5 text-blue-600" /> 설비 수치 트렌드 보고서</h2>
                                                <table className="text-[10px] text-left mt-3">
                                                    <tbody>
                                                        <tr><th className="p-1.5 bg-slate-50 border w-16 font-bold text-slate-500">점검 대상</th><td className="p-1.5 border font-black text-blue-700 tracking-tight">[{historyEqId}] {equipments.find(e=>e.id===historyEqId)?.name}</td></tr>
                                                        <tr><th className="p-1.5 bg-slate-50 border font-bold text-slate-500">조회 기간</th><td className="p-1.5 border font-bold">{startDate || '전체'} ~ {endDate || '전체'}</td></tr>
                                                        <tr><th className="p-1.5 bg-slate-50 border font-bold text-slate-500">출력 일자</th><td className="p-1.5 border font-bold">{new Date().toLocaleDateString('ko-KR')}</td></tr>
                                                    </tbody>
                                                </table>
                                            </div>
                                            {/* 💡 [해결 3] 하단 여백 부족으로 잘리는 현상 방지를 위해 컨테이너 여백 강화 */}
                                            <TrendChart records={chronologicalRecords} title="진동" category="vibration" items={['Motor', 'Gearbox', '본체', 'Oil Pump']} unit="mm/s" />
                                            <TrendChart records={chronologicalRecords} title="발열" category="heating" items={['Motor', 'Gearbox', '본체', 'Bearing']} unit="°C" />
                                        </div>
                                    </div>
                                )}
                                
                                {historyView === 'report' && (
                                    <div className="space-y-4 animate-in slide-in-from-bottom-4">
                                        <div className="flex gap-2" data-html2canvas-ignore="true">
                                            <button onClick={handleDownloadExcel} className="flex-1 bg-emerald-600 text-white py-3.5 rounded-xl text-xs font-black shadow-md flex items-center justify-center gap-2 active:scale-95 transition-all"><FileSpreadsheet className="w-4 h-4" /> 엑셀 저장</button>
                                            <button onClick={() => handleDownloadPDF('pdf-report-container')} disabled={isGeneratingPDF} className="flex-1 bg-slate-800 text-white py-3.5 rounded-xl text-xs font-black shadow-md flex items-center justify-center gap-2 active:scale-95 transition-all">{isGeneratingPDF ? '생성중...' : <><FileText className="w-4 h-4" /> PDF 보고서 저장</>}</button>
                                        </div>
                                        <div className="overflow-x-auto border-2 border-slate-300 rounded-2xl bg-slate-200 hide-scrollbar shadow-inner">
                                            <div id="pdf-report-container" className="bg-white p-10 w-[850px] font-sans">
                                                <div className="flex justify-between items-start mb-8 border-b-4 border-slate-900 pb-6"><div><h1 className="text-2xl font-black text-slate-900 mb-4 tracking-tighter uppercase font-black tracking-tight underline decoration-blue-500">PM 점검 종합 보고서</h1><table className="text-[10px] text-left"><tbody><tr><th className="border p-2.5 bg-slate-50 w-24 font-bold">조회 등급</th><td className="border p-2.5 font-bold text-blue-800 w-48">{historyEqClass}급 설비</td></tr><tr><th className="border p-2.5 bg-slate-50 font-bold">점검 대상</th><td className="border p-2.5 font-bold text-slate-800">{historyEqId ? `[${historyEqId}] ${equipments.find(e=>e.id===historyEqId)?.name}` : '그룹 내 전체 설비'}</td></tr><tr><th className="border p-2.5 bg-slate-50 font-bold">출력 일자</th><td className="border p-2.5 font-medium">{new Date().toLocaleDateString('ko-KR')}</td></tr></tbody></table></div><table className="text-xs text-center border-collapse mt-4 shadow-sm"><tbody><tr><th rowSpan="2" className="border-2 border-slate-800 p-3 bg-slate-100 text-sm font-black">결<br/>재</th><th className="border-2 border-slate-800 p-1.5 w-20 bg-slate-50 font-bold text-[10px]">담당</th><th className="border-2 border-slate-800 p-1.5 w-20 bg-slate-50 font-bold text-[10px]">검토</th><th className="border-2 border-slate-800 p-1.5 w-20 bg-slate-50 font-bold text-[10px]">확인</th><th className="border-2 border-slate-600 p-1.5 w-20 bg-slate-50 font-bold text-[10px]">승인</th></tr><tr><td className="border-2 border-slate-800 h-16"></td><td className="border-2 border-slate-800 h-16"></td><td className="border-2 border-slate-800 h-16"></td><td className="border-2 border-slate-800 h-16"></td></tr></tbody></table></div>
                                                <div className="mb-8"><h3 className="font-bold text-xl mb-4 border-l-8 border-blue-600 pl-3 text-slate-800 tracking-tighter">1. 상세 점검 내역</h3><table className="w-full text-[10px] border-collapse border-2 border-slate-800"><thead><tr className="bg-slate-200 border-b-2 border-slate-800 font-black"><th>일시</th><th>상태</th><th>등급</th><th>설비명</th><th>점검자</th><th className="w-20">암페어</th><th className="w-20">M/Seal</th><th className="w-48 text-center">조치 결과</th></tr></thead><tbody>{filteredRecords.map(r=><tr key={r.id} className="border-b hover:bg-slate-50 font-bold"><td className="border p-2 text-center font-medium whitespace-nowrap tracking-tighter">{String(r.date).replace('T',' ')}</td><td className="border p-2 text-center font-bold text-blue-600">{r.runStatus}</td><td className="border p-2 text-center font-bold">{r.eqClass}</td><td className="border p-2 font-bold text-slate-700">[{r.equipmentId}] {r.equipmentName}</td><td className="border p-2 text-center font-bold">{r.inspector}</td><td className="border p-2 text-center font-bold text-blue-700">{r.extra?.amphere||'-'}</td><td className="border p-2 text-center font-bold">{r.extra?.mSeal||'-'}</td><td className="border p-2 text-[9px] leading-normal font-medium text-slate-600 italic">"{r.remarks || '특이사항 없음'}"</td></tr>)}</tbody></table></div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {historyView === 'list' && filteredRecords.map(r => (
                                    <div key={r.id} className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm relative transition-all hover:shadow-md animate-in slide-in-from-bottom-2"><div className="flex justify-between items-start mb-3 border-b pb-3 border-slate-50"><div className="flex flex-col"><div className="flex items-center gap-1.5 mb-1"><span className={`text-[9px] font-black uppercase px-2 py-0.5 rounded-full ${r.runStatus === '가동 중' ? 'bg-blue-100 text-blue-600' : 'bg-rose-100 text-rose-600'}`}>{r.runStatus}</span><span className="text-[10px] font-black text-slate-400 uppercase tracking-tighter">{r.eqClass}급 설비</span></div><h3 className="font-extrabold text-slate-800 text-base leading-tight font-black underline decoration-blue-500 tracking-tight">[{r.equipmentId}] {r.equipmentName}</h3></div><div className="text-right"><div className="text-[10px] text-slate-400 mb-1 font-bold">{r.displayDate}</div><button onClick={() => { setFormData({...r}); setEditingId(r.id); setActiveTab('form'); }} className="p-1.5 bg-blue-50 text-blue-600 rounded-lg shadow-sm hover:bg-blue-100 transition-colors"><Edit2 className="w-3.5 h-3.5" /></button></div></div><div className="grid grid-cols-2 gap-3 text-[10px]"><div className="bg-slate-50 p-2.5 rounded-xl border border-slate-100 flex flex-col gap-1 font-black"><span className="text-slate-400 text-[8px] uppercase tracking-widest font-black">vibration</span>{Object.entries(r.vibration || {}).map(([k,v])=>v && <div key={k} className="flex justify-between"><span>{k}</span><b className="text-blue-700">{v}</b></div>)}</div><div className="bg-slate-50 p-2.5 rounded-xl border border-slate-100 flex flex-col gap-1 font-black"><span className="text-slate-400 text-[8px] uppercase font-black tracking-widest">noise</span>{Object.entries(r.noise || {}).map(([k,v])=>v && <div key={k} className="flex justify-between"><span>{k}</span><b className={v==='정상'?'text-emerald-600':'text-rose-600'}>{v}</b></div>)}</div><div className="bg-slate-50 p-2.5 rounded-xl border border-slate-100 col-span-2 flex justify-between items-center tracking-tight font-bold text-slate-600 font-black"><span>암페어: <b>{r.extra?.amphere||'-'}</b> / M.Seal: <b>{r.extra?.mSeal||'-'}</b> / 오일: <b>{r.oil?.level}/{r.oil?.discoloration}</b></span></div></div>{r.remarks && <div className="mt-3 p-3 bg-amber-50 rounded-xl text-[11px] text-amber-900 border border-amber-100 font-medium leading-relaxed italic shadow-inner tracking-tighter">"{r.remarks}"</div>}{r.photo && r.photo.length > 0 && <div className="mt-3 flex gap-2 overflow-x-auto pb-1">{r.photo.map((p, i) => <img key={i} src={p} className="w-16 h-16 object-cover rounded-lg border border-slate-200 cursor-pointer shadow-sm hover:ring-2 hover:ring-blue-400 transition-all" onClick={() => setPhotoModal(p)} />)}</div>}</div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="space-y-6 animate-in fade-in duration-300">
                                <div className="bg-white p-6 rounded-3xl border-2 border-slate-100 shadow-sm transition-all hover:border-blue-200">
                                    <h3 className="font-black text-slate-800 mb-5 flex items-center gap-2 font-black"><Settings className="w-5 h-5 text-blue-600" /> {setupEditMode ? '설비 마스터 수정' : '데이터베이스 관리'}</h3>
                                    {!setupEditMode && (
                                        <div className="mb-6 p-4 bg-blue-50/50 rounded-2xl border border-blue-100 border-dashed"><div className="flex justify-between items-center mb-3"><span className="text-xs font-black text-blue-700 flex items-center gap-1 font-black"><Upload className="w-3.5 h-3.5" /> 엑셀 일괄 업로드</span><button onClick={handleDownloadSample} className="text-[10px] text-blue-600 underline font-bold tracking-tight font-black">양식 받기</button></div><label className="w-full bg-white hover:bg-slate-50 text-slate-700 font-bold py-4 rounded-xl border-2 border-slate-200 flex items-center justify-center gap-2 cursor-pointer shadow-sm transition-all tracking-tight font-black"><FileSpreadsheet className="w-4 h-4 text-emerald-600" /> 파일 선택 및 업로드<input type="file" accept=".xlsx, .xls, .csv" className="hidden" onChange={handleFileUpload} /></label></div>
                                    )}
                                    <div className="space-y-4 pt-2">
                                        <h4 className="text-xs font-black text-blue-600 uppercase tracking-widest px-1 font-black underline underline-offset-4 decoration-blue-200">{setupEditMode ? '선택 설비 정보 수정' : '신규 개별 등록'}</h4>
                                        <div className="flex gap-3"><input type="text" placeholder="설비 ID" disabled={setupEditMode} className={`flex-[3] p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none font-bold text-slate-700 focus:border-blue-500 transition-all ${setupEditMode ? 'opacity-50 grayscale' : ''}`} value={newEqId} onChange={e=>setNewEqId(e.target.value)} /><select className="flex-1 p-3 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none font-black text-blue-600 focus:border-blue-500 font-black" value={newEqClass} onChange={e=>setNewEqClass(e.target.value)}><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select></div>
                                        <input type="text" placeholder="설비명 (예: 가압 송출 펌프)" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none font-bold text-slate-700 focus:border-blue-500 transition-all font-black" value={newEqName} onChange={e=>setNewEqName(e.target.value)} />
                                        <div className="bg-slate-50 p-4 rounded-2xl border border-slate-200 shadow-sm font-black">
                                            <p className="text-xs font-black text-slate-400 mb-3 uppercase tracking-tighter flex items-center gap-1.5 font-black"><ShieldCheck className="w-3.5 h-3.5" /> 점검 부위 및 항목 설정</p>
                                            <div className="flex flex-wrap gap-2 mb-4 font-black">{ALL_PARTS.map(part => { const isChecked = newDefaultParts.includes(part); return (<button key={part} onClick={() => setNewDefaultParts(prev => isChecked ? prev.filter(p => p !== part) : [...prev, part])} className={`px-3 py-1.5 rounded-full text-[11px] font-black border transition-all ${isChecked ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-slate-400 border-slate-200 shadow-sm'}`}>{part}</button>); })}</div>
                                            <p className="text-[10px] font-black text-slate-300 mb-2 uppercase tracking-widest font-black">기타 정밀 항목 노출 여부</p>
                                            <div className="flex flex-wrap gap-2 font-black">
                                                {OIL_FIELDS.map(p => (<button key={p} onClick={() => setNewOilParts(prev => newOilParts.includes(p) ? prev.filter(x => x !== p) : [...prev, p])} className={`px-2.5 py-1.5 rounded-lg text-[10px] font-black border transition-all ${newOilParts.includes(p) ? 'bg-emerald-600 text-white border-emerald-600 shadow-sm' : 'bg-white text-slate-400 border-slate-100 shadow-sm'}`}>오일:{p}</button>))}
                                                {EXTRA_FIELDS.map(p => (<button key={p} onClick={() => setNewExtraParts(prev => newExtraParts.includes(p) ? prev.filter(x => x !== p) : [...prev, p])} className={`px-2.5 py-1.5 rounded-lg text-[10px] font-black border transition-all ${newExtraParts.includes(p) ? 'bg-indigo-600 text-white border-indigo-600 shadow-sm' : 'bg-white text-slate-400 border-slate-100 shadow-sm'}`}>기타:{p}</button>))}
                                            </div>
                                        </div>
                                        <div className="flex gap-2">{setupEditMode && <button onClick={() => { setSetupEditMode(false); setNewEqId(''); setNewEqName(''); setNewDefaultParts([]); setNewOilParts([]); setNewExtraParts([]); }} className="flex-1 py-4.5 rounded-2xl text-slate-500 font-black border-2 border-slate-100 hover:bg-slate-100 transition-all shadow-sm font-black">취소</button>}<button onClick={handleAddEquipment} className="flex-[2] bg-slate-900 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 flex items-center justify-center gap-2 transition-all font-black"><Plus className="w-5 h-5" /> {setupEditMode ? '정보 수정 완료' : '마스터 추가'}</button></div>
                                    </div>
                                </div>
                                <div className="bg-white p-5 rounded-3xl border border-slate-200 max-h-[350px] overflow-y-auto shadow-sm divide-y divide-slate-50 font-bold">
                                    <h4 className="text-xs font-black text-slate-400 mb-4 tracking-widest uppercase px-1 font-black underline">등록 설비 마스터 ({equipments.length}건)</h4>
                                    {sortedEquipments.map(eq => (
                                        <div key={eq.id} className="flex justify-between items-center py-4 px-1 group transition-all hover:bg-blue-50/50 active:bg-blue-100 cursor-pointer rounded-xl" onClick={() => handleSetupItemClick(eq)}>
                                            <div className="flex flex-col"><span className="text-[9px] font-black text-blue-500 uppercase tracking-tighter mb-0.5 font-black">{eq.eqClass}급</span><span className="text-sm font-extrabold text-slate-800 tracking-tight font-black">[{eq.id}] {eq.name}</span><span className="text-[8px] text-slate-300 font-bold tracking-tighter uppercase font-black tracking-tight">부위: {eq.defaultParts?.length} / 오일: {eq.oilParts?.length} / 기타: {eq.extraParts?.length}</span></div>
                                            <button onClick={(e) => { e.stopPropagation(); setDeleteModalState({ isOpen: true, eqId: eq.id, password: '', error: '' }); }} className="p-2 text-slate-200 hover:text-rose-500 transition-all active:scale-90"><Trash2 className="w-5 h-5" /></button>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => setCurrentUser('')} className="w-full py-4.5 rounded-2xl text-slate-400 font-black border-2 border-slate-100 hover:bg-slate-100 transition-all flex items-center justify-center gap-2 active:scale-95 shadow-sm font-black font-black"><LogOut className="w-5 h-5" /> 로그아웃</button>
                            </div>
                        )}
                    </main>

                    {toast.show && (<div className={`fixed top-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-3xl shadow-2xl text-white text-sm font-black flex items-center z-[130] animate-in slide-in-from-top-10 duration-500 ${toast.type === 'error' ? 'bg-rose-500' : 'bg-slate-900/90 backdrop-blur-md'}`}>{toast.type === 'error' ? <AlertTriangle className="w-5 h-5 mr-3" /> : <CheckCircle2 className="w-5 h-5 text-emerald-400 mr-3" />}{toast.message}</div>)}
                    {photoModal && (<div className="fixed inset-0 bg-black/90 z-[140] flex items-center justify-center p-4 animate-in fade-in duration-300 shadow-2xl font-black" onClick={() => setPhotoModal(null)}><button className="absolute top-6 right-6 text-white bg-black/50 rounded-full p-2"><X className="w-6 h-6" /></button><img src={photoModal} alt="확대" className="max-w-full max-h-[85vh] object-contain rounded-2xl shadow-2xl border-4 border-white/10" onClick={e=>e.stopPropagation()} /></div>)}
                    {deleteModalState.isOpen && (
                        <div className="fixed inset-0 bg-black/50 z-[150] flex items-center justify-center p-4 backdrop-blur-sm animate-in fade-in duration-200">
                            <div className="bg-white rounded-3xl p-8 w-full max-w-xs animate-in zoom-in-95 duration-200 shadow-2xl text-center"><h3 className="font-black text-xl mb-3 text-slate-800 tracking-tight underline font-black">설비 삭제 확인</h3><p className="text-xs text-slate-400 mb-6 leading-relaxed font-bold tracking-tight"><b>[{deleteModalState.eqId}]</b> 설비를 영구 삭제하시겠습니까? <br/>비밀번호 <b>kpb1234</b>를 입력하세요.</p><input type="password" placeholder="비밀번호" className="w-full p-3 bg-slate-50 border-2 border-slate-200 rounded-xl mb-4 text-center font-bold outline-none transition-all focus:border-blue-500 font-black" value={deleteModalState.password} onChange={e => setDeleteModalState(prev => ({ ...prev, password: e.target.value, error: '' }))} />{deleteModalState.error && <p className="text-xs text-rose-500 mb-4 font-bold text-center font-black">{deleteModalState.error}</p>}<div className="flex gap-2"><button onClick={() => setDeleteModalState({ isOpen: false, eqId: null, password: '', error: '' })} className="flex-1 py-3 bg-slate-100 rounded-xl text-sm font-bold text-slate-500 active:scale-95 transition-all font-black">취소</button><button onClick={handleConfirmDelete} className="flex-1 py-3 bg-rose-600 text-white rounded-xl text-sm font-bold active:scale-95 transition-all font-black shadow-lg">삭제 확인</button></div></div>
                        </div>
                    )}

                    <nav className="bg-white/90 backdrop-blur-md border-t border-slate-100 fixed bottom-0 w-full max-w-md flex justify-around p-3 pb-8 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] z-50 rounded-t-[40px]">
                        <button className={`flex flex-col items-center gap-1.5 p-3 rounded-2xl transition-all ${activeTab === 'form' ? 'text-blue-600 scale-110 font-black' : 'text-slate-300 font-bold'}`} onClick={() => setActiveTab('form')}><ClipboardCheck className="w-7 h-7" /><span className="text-[10px] uppercase tracking-tighter font-black tracking-widest">CHECK</span></button>
                        <button className={`flex flex-col items-center gap-1.5 p-3 rounded-2xl transition-all ${activeTab === 'history' ? 'text-blue-600 scale-110 font-black' : 'text-slate-300 font-bold'}`} onClick={() => setActiveTab('history')}><History className="w-7 h-7" /><span className="text-[10px] uppercase tracking-tighter font-black tracking-widest">REPORT</span></button>
                        <button className={`flex flex-col items-center gap-1.5 p-3 rounded-2xl transition-all ${activeTab === 'settings' ? 'text-blue-600 scale-110 font-black' : 'text-slate-300 font-bold'}`} onClick={() => setActiveTab('settings')}><Settings className="w-7 h-7" /><span className="text-[10px] uppercase tracking-tighter font-black tracking-widest">SETUP</span></button>
                    </nav>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
