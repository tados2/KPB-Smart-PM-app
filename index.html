<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 설비 P.M 시스템</title>
    
    <!-- 지도(Import Map): 브라우저가 모듈 경로를 찾을 수 있게 가이드 제공 -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
    </script>

    <!-- 디자인 및 번역기 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 데이터 처리 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">
    <div id="root"></div>

    <!-- 리액트 코드 시작 (모듈 모드로 실행) -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            ClipboardCheck, History, Activity, Volume2, Flame, Droplet, 
            Save, User, Wrench, CheckCircle2, AlertTriangle, CheckSquare, Square, 
            Settings, LogOut, Plus, Trash2, Clock, Edit2, Upload, Download, Camera, 
            X, Calendar, Search, FileSpreadsheet, Loader2, ShieldAlert
        } from 'lucide-react';

        // Firebase 라이브러리 로드
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // ==========================================
        // 🔑 [사용자님의 파이어베이스 고유 설정값]
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCzTEKN9djNzuXwFUCrjfhfMXi5By25lwE",
            authDomain: "smart-pm-system.firebaseapp.com",
            projectId: "smart-pm-system",
            storageBucket: "smart-pm-system.firebasestorage.app",
            messagingSenderId: "670061026122",
            appId: "1:670061026122:web:b79aa67a686e2ef204bfb3",
            measurementId: "G-VM7ENYM6EP"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Canvas 환경 변수 체크 및 앱 ID 설정
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'smart-pm-system-app';

        const INITIAL_EQUIPMENT_LIST = [
            { id: 'P-101A', name: 'Feed Pump A', eqClass: 'A' },
            { id: 'P-101B', name: 'Feed Pump B', eqClass: 'A' },
            { id: 'C-201', name: 'Main Compressor', eqClass: 'B' },
            { id: 'B-301', name: 'Heating Boiler', eqClass: 'C' },
            { id: 'AG-401', name: 'Reactor Agitator', eqClass: 'D' },
        ];

        const getCurrentDateTimeLocal = () => {
            const now = new Date();
            const offset = now.getTimezoneOffset() * 60000;
            return (new Date(now - offset)).toISOString().slice(0, 16);
        };

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800; 
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) { height = height * (MAX_WIDTH / width); width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                    };
                };
            });
        };

        const EquipmentSelector = ({ equipments, selectedId, onSelect, selectedClass, onClassChange }) => {
            const [search, setSearch] = useState('');
            const classes = ['전체', 'A', 'B', 'C', 'D'];

            const filtered = useMemo(() => {
                return equipments.filter(eq => {
                    const matchClass = selectedClass === '전체' || eq.eqClass === selectedClass;
                    const matchSearch = String(eq.id).toLowerCase().includes(search.toLowerCase()) || 
                                      String(eq.name).toLowerCase().includes(search.toLowerCase());
                    return matchClass && matchSearch;
                }).slice(0, 50);
            }, [equipments, selectedClass, search]);

            if (selectedId) {
                const eq = equipments.find(e => e.id === selectedId);
                return (
                    <div className="flex justify-between items-center bg-blue-50 p-3 rounded-lg border border-blue-200 shadow-sm animate-in fade-in">
                        <div className="truncate pr-2">
                            <span className="font-bold text-blue-800 mr-1.5">[{eq?.id}]</span>
                            <span className="text-slate-700 font-medium">{eq?.name}</span>
                            <span className="ml-2 text-[10px] bg-blue-200 text-blue-800 px-1.5 py-0.5 rounded font-bold">{eq?.eqClass}급</span>
                        </div>
                        <button onClick={() => { onSelect(''); setSearch(''); }} className="shrink-0 text-xs bg-white border border-blue-300 text-blue-600 px-3 py-2 rounded hover:bg-blue-100 font-bold shadow-sm">다시 선택</button>
                    </div>
                );
            }

            return (
                <div className="bg-slate-50 p-3 rounded-lg border border-slate-200 flex flex-col gap-3">
                    <div className="flex bg-white rounded-lg border border-slate-200 overflow-hidden shadow-sm">
                        {classes.map(c => (
                            <button key={c} onClick={() => onClassChange(c)} className={`flex-1 py-2 text-xs font-bold transition-colors ${selectedClass === c ? 'bg-blue-600 text-white' : 'text-slate-600 hover:bg-slate-50 border-r border-slate-100 last:border-0'}`}>
                                {c === '전체' ? '전체' : `${c}급`}
                            </button>
                        ))}
                    </div>
                    <div className="relative">
                        <Search className="w-4 h-4 absolute left-3 top-3 text-slate-400" />
                        <input type="text" placeholder="설비명 또는 ID 검색..." className="w-full pl-9 p-2.5 text-sm border border-slate-200 rounded-lg outline-none" value={search} onChange={e => setSearch(e.target.value)} />
                    </div>
                    <div className="max-h-40 overflow-y-auto border border-slate-200 rounded-lg bg-white divide-y divide-slate-100">
                        {filtered.length > 0 ? filtered.map(eq => (
                            <button key={eq.id} onClick={() => onSelect(eq.id)} className="w-full text-left p-3 hover:bg-blue-50 flex items-center justify-between group">
                                <div className="truncate"><span className="font-bold text-slate-700 mr-2">[{eq.id}]</span><span className="text-sm text-slate-600">{eq.name}</span></div>
                                <span className={`text-[10px] px-1.5 py-0.5 rounded font-bold ${eq.eqClass === 'A' ? 'bg-rose-100 text-rose-700' : 'bg-slate-200 text-slate-700'}`}>{eq.eqClass}급</span>
                            </button>
                        )) : <div className="p-4 text-center text-xs text-slate-400">설비가 없습니다.</div>}
                    </div>
                </div>
            );
        };

        const CategorySection = ({ title, icon: Icon, items, type, data, onChange, unit }) => {
            return (
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 mb-6">
                    <div className="flex items-center mb-4 border-b border-slate-50 pb-2">
                        <Icon className="w-5 h-5 text-slate-500 mr-2" />
                        <span className="font-bold text-slate-800">{title}</span>
                    </div>
                    <div className="space-y-3">
                        {items.map(item => {
                            const isSelected = data[item] !== undefined;
                            return (
                                <div key={item} className={`flex flex-col sm:flex-row sm:items-center gap-2 p-2.5 rounded-lg border transition-colors ${isSelected ? 'bg-blue-50/30 border-blue-100' : 'bg-slate-50 border-slate-100'}`}>
                                    <button className="flex items-center flex-1 text-left" onClick={() => {
                                        const newData = { ...data };
                                        if (isSelected) delete newData[item];
                                        else newData[item] = type === 'numeric' ? '' : '정상';
                                        onChange(newData);
                                    }}>
                                        {isSelected ? <CheckSquare className="w-5 h-5 text-blue-500 mr-2 shrink-0"/> : <Square className="w-5 h-5 text-slate-300 mr-2 shrink-0"/>}
                                        <span className={`font-medium ${isSelected ? 'text-blue-800' : 'text-slate-500'}`}>{item}</span>
                                    </button>
                                    {isSelected && (
                                        <div className="pl-7 sm:pl-0 flex-1 flex justify-end animate-in fade-in duration-200">
                                            {type === 'numeric' ? (
                                                <div className="relative w-full sm:w-32">
                                                    <input type="number" className="w-full p-2 text-sm border border-blue-200 rounded outline-none text-right pr-8 bg-white shadow-sm" placeholder="0.0" value={data[item]} onChange={(e) => onChange({ ...data, [item]: e.target.value })} />
                                                    {unit && <span className="absolute right-2 top-2 text-xs text-slate-400 font-bold">{unit}</span>}
                                                </div>
                                            ) : (
                                                <div className="flex w-full sm:w-auto bg-white rounded border border-blue-200 overflow-hidden shadow-sm">
                                                    {['정상', '주의', '이상'].map(status => (
                                                        <button key={status} onClick={() => onChange({ ...data, [item]: status })} className={`flex-1 sm:px-4 py-2 text-xs transition-colors ${data[item] === status ? (status === '정상' ? 'bg-emerald-100 text-emerald-700' : status === '주의' ? 'bg-amber-100 text-amber-700' : 'bg-rose-100 text-rose-700') : 'text-slate-400'}`}>{status}</button>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const OilSection = ({ data, onChange }) => {
            const update = (field, value) => onChange({ ...data, [field]: value });
            const Row = ({ label, field, options }) => (
                <div className="flex flex-col sm:flex-row sm:items-center justify-between p-2.5 bg-slate-50 rounded-lg border border-slate-100 gap-2">
                    <span className="font-medium text-slate-700 text-sm pl-1">{label}</span>
                    <div className="flex w-full sm:w-auto bg-white rounded border border-blue-200 overflow-hidden shadow-sm">
                        {options.map((opt) => (
                            <button key={opt} onClick={() => update(field, opt)} className={`flex-1 sm:px-5 py-2 text-xs transition-colors ${data[field] === opt ? 'bg-blue-100 text-blue-700 font-bold' : 'text-slate-400 hover:bg-slate-50'}`}>{opt}</button>
                        ))}
                    </div>
                </div>
            );
            return (
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 mb-6">
                    <div className="flex items-center mb-4 border-b border-slate-50 pb-2"><Droplet className="w-5 h-5 text-slate-500 mr-2" /><span className="font-bold text-slate-800">오일 상태 점검</span></div>
                    <div className="space-y-3">
                        <Row label="오일 레벨" field="level" options={['양호', '보충', '부족']} />
                        <Row label="변색 유무" field="discoloration" options={['정상', '변색']} />
                        <Row label="Leak (누유)" field="leak" options={['정상', '누유']} />
                    </div>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [currentUser, setCurrentUser] = useState(''); 
            const [isFirebaseLoading, setIsFirebaseLoading] = useState(true);
            const [permissionError, setPermissionError] = useState(false);
            const [equipments, setEquipments] = useState([]);
            const [records, setRecords] = useState([]);
            const [activeTab, setActiveTab] = useState('form');
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
            const [formEqClass, setFormEqClass] = useState('전체');
            const [historyEqClass, setHistoryEqClass] = useState('전체');
            const [historyEqId, setHistoryEqId] = useState('');
            const [historyView, setHistoryView] = useState('list'); 
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            const [newEqId, setNewEqId] = useState('');
            const [newEqName, setNewEqName] = useState('');
            const [newEqClass, setNewEqClass] = useState('C');
            const [editingId, setEditingId] = useState(null);
            const [photoModal, setPhotoModal] = useState(null);
            const [isGeneratingPDF, setIsGeneratingPDF] = useState(false);
            const [deleteModalState, setDeleteModalState] = useState({ isOpen: false, eqId: null, password: '', error: '' });

            const showMessage = (msg, type = 'success') => {
                setToast({ show: true, message: String(msg), type });
                setTimeout(() => setToast(prev => ({ ...prev, show: false })), 3000);
            };

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        console.error("Auth Error:", err);
                        setIsFirebaseLoading(false);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const eqRef = collection(db, 'artifacts', appId, 'public', 'data', 'equipments');
                const unsubEq = onSnapshot(eqRef, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    if (data.length === 0) INITIAL_EQUIPMENT_LIST.forEach(eq => setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'equipments', eq.id), eq));
                    else setEquipments(data);
                }, (err) => { if(err.code === 'permission-denied') setPermissionError(true); });

                const recRef = collection(db, 'artifacts', appId, 'public', 'data', 'records');
                const unsubRec = onSnapshot(recRef, (snapshot) => {
                    setRecords(snapshot.docs.map(doc => doc.data()));
                    setIsFirebaseLoading(false);
                }, (err) => { if(err.code === 'permission-denied') setPermissionError(true); setIsFirebaseLoading(false); });

                return () => { unsubEq(); unsubRec(); };
            }, [user]);

            const [formData, setFormData] = useState({ equipmentId: '', date: getCurrentDateTimeLocal(), vibration: {}, noise: {}, heating: {}, oil: { level: '양호', discoloration: '정상', leak: '정상' }, remarks: '', photo: [] });

            const handleEquipmentChange = (id) => {
                if (!id) { setFormData({ ...formData, equipmentId: '', vibration: {}, noise: {}, heating: {}, photo: [], remarks: '' }); return; }
                const last = [...records].sort((a,b) => new Date(b.date) - new Date(a.date)).find(r => r.equipmentId === id);
                if (last) {
                    const clear = (obj) => Object.fromEntries(Object.keys(obj || {}).map(k => [k, '']));
                    setFormData({ ...formData, equipmentId: id, vibration: clear(last.vibration), heating: clear(last.heating), noise: last.noise || {}, oil: last.oil || { level: '양호', discoloration: '정상', leak: '정상' }, remarks: '', photo: [] });
                } else setFormData({ ...formData, equipmentId: id });
            };

            const handleSave = async () => {
                if (!formData.equipmentId) return showMessage('설비를 선택하세요.', 'error');
                const id = editingId || Date.now().toString();
                const eq = equipments.find(e => e.id === formData.equipmentId);
                const data = { ...formData, id, inspector: currentUser, equipmentName: eq?.name, eqClass: eq?.eqClass, displayDate: new Date(formData.date).toLocaleString() };
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'records', id), data);
                    showMessage('저장되었습니다.'); setEditingId(null); setFormData({ ...formData, equipmentId: '', vibration: {}, noise: {}, heating: {}, photo: [], remarks: '' }); setActiveTab('history');
                } catch (e) { showMessage('저장 실패', 'error'); }
            };

            const filteredRecords = useMemo(() => {
                let res = records;
                if (historyEqClass !== '전체') res = res.filter(r => r.eqClass === historyEqClass);
                if (historyEqId) res = res.filter(r => r.equipmentId === historyEqId);
                if (startDate) res = res.filter(r => r.date >= startDate);
                if (endDate) res = res.filter(r => r.date <= endDate + "T23:59");
                return res.sort((a,b) => new Date(b.date) - new Date(a.date));
            }, [records, historyEqClass, historyEqId, startDate, endDate]);

            if (permissionError) return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100">
                    <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md text-center">
                        <ShieldAlert className="w-16 h-16 text-rose-500 mx-auto mb-4" />
                        <h1 className="text-xl font-bold mb-4">보안 규칙 설정 필요</h1>
                        <p className="text-sm text-slate-600 mb-6 leading-relaxed">Firebase Database의 <b>Rules(규칙)</b> 탭에서 <b>allow read, write: if true;</b> 설정을 확인해 주세요.</p>
                        <button onClick={() => window.location.reload()} className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">새로고침</button>
                    </div>
                </div>
            );

            if (!currentUser) return <LoginScreen onLogin={setCurrentUser} />;
            if (isFirebaseLoading) return <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50"><Loader2 className="w-10 h-10 text-blue-600 animate-spin mb-4" /><p className="font-bold text-slate-500">데이터 연결 중...</p></div>;

            return (
                <div className="min-h-screen bg-slate-100 max-w-md mx-auto shadow-2xl flex flex-col relative overflow-hidden">
                    <header className="bg-blue-700 text-white p-4 sticky top-0 z-20 flex justify-between items-center shadow-md">
                        <div className="flex items-center"><Wrench className="w-5 h-5 mr-2" /><h1 className="text-lg font-bold">스마트 P.M 기록</h1></div>
                        <span className="text-xs bg-blue-800 px-2 py-1 rounded flex items-center"><User className="w-3 h-3 mr-1"/>{currentUser}</span>
                    </header>

                    <main className="flex-1 overflow-y-auto p-4 pb-24">
                        {activeTab === 'form' && (
                            <div className="space-y-4 animate-in fade-in duration-300">
                                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                                    <label className="block text-sm font-bold text-slate-700 mb-2">점검 대상 설비</label>
                                    <EquipmentSelector equipments={equipments} selectedId={formData.equipmentId} onSelect={handleEquipmentChange} selectedClass={formEqClass} onClassChange={setFormEqClass} />
                                    <label className="block text-sm font-bold text-slate-700 mt-4 mb-2">점검 일시</label>
                                    <div className="relative"><Clock className="w-4 h-4 absolute left-3 top-3 text-slate-400" /><input type="datetime-local" className="w-full pl-9 p-2 bg-slate-50 border rounded-lg text-sm" value={formData.date} onChange={e => handleInputChange('date', e.target.value)} /></div>
                                </div>
                                <CategorySection title="진동 점검 (수치)" icon={Activity} type="numeric" unit="mm/s" items={['Motor', 'Gearbox', '본체', 'Oil Pump']} data={formData.vibration} onChange={v => handleInputChange('vibration', v)} />
                                <CategorySection title="이음 점검 (상태)" icon={Volume2} type="status" items={['Motor', 'Gearbox', '본체', 'Bearing']} data={formData.noise} onChange={n => handleInputChange('noise', n)} />
                                <CategorySection title="발열 점검 (온도)" icon={Flame} type="numeric" unit="°C" items={['Motor', 'Gearbox', '본체', 'Bearing']} data={formData.heating} onChange={h => handleInputChange('heating', h)} />
                                <OilSection data={formData.oil} onChange={o => handleInputChange('oil', o)} />
                                <div className="bg-white p-4 rounded-xl border border-slate-100 shadow-sm mb-6">
                                    <textarea rows="3" placeholder="특이사항 입력..." className="w-full p-3 bg-slate-50 border rounded-lg text-sm outline-none" value={formData.remarks} onChange={e => handleInputChange('remarks', e.target.value)}></textarea>
                                    <button onClick={handleSave} className="w-full mt-4 bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center"><Save className="w-5 h-5 mr-2" /> 점검 완료 저장</button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-3 animate-in fade-in duration-300">
                                <EquipmentSelector equipments={equipments} selectedId={historyEqId} onSelect={setHistoryEqId} selectedClass={historyEqClass} onClassChange={setHistoryEqClass} />
                                <div className="grid grid-cols-2 bg-slate-200 p-1 rounded-lg">
                                    <button onClick={() => setHistoryView('list')} className={`py-2 text-xs font-bold rounded ${historyView === 'list' ? 'bg-white shadow text-blue-700' : 'text-slate-500'}`}>목록</button>
                                    <button onClick={() => setHistoryView('report')} className={`py-2 text-xs font-bold rounded ${historyView === 'report' ? 'bg-white shadow text-blue-700' : 'text-slate-500'}`}>보고서</button>
                                </div>
                                {filteredRecords.map(r => (
                                    <div key={r.id} className="bg-white p-4 rounded-xl border shadow-sm">
                                        <div className="flex justify-between items-start border-b pb-2 mb-2">
                                            <div><span className="text-[10px] bg-slate-100 px-1.5 py-0.5 rounded mr-2">{r.eqClass}급</span><span className="font-bold text-blue-800">[{r.equipmentId}]</span></div>
                                            <span className="text-[10px] text-slate-400">{r.displayDate}</span>
                                        </div>
                                        <div className="text-xs text-slate-600 space-y-1">
                                            <p><b>진동:</b> {Object.entries(r.vibration || {}).map(([k,v])=>`${k}:${v}`).join(', ')}</p>
                                            <p><b>상태:</b> {Object.entries(r.noise || {}).map(([k,v])=>`${k}:${v}`).join(', ')}</p>
                                            {r.remarks && <p className="bg-amber-50 p-2 rounded mt-2"><b>특이사항:</b> {r.remarks}</p>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="animate-in fade-in duration-300">
                                <div className="bg-white p-4 rounded-xl border border-slate-200">
                                    <h3 className="font-bold mb-4 flex items-center"><Settings className="w-4 h-4 mr-2" />설비 관리</h3>
                                    <div className="space-y-3">
                                        <div className="flex gap-2">
                                            <input type="text" placeholder="ID" className="flex-1 p-2 border rounded-lg text-sm" value={newEqId} onChange={e=>setNewEqId(e.target.value)} />
                                            <select className="p-2 border rounded-lg text-sm font-bold" value={newEqClass} onChange={e=>setNewEqClass(e.target.value)}><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select>
                                        </div>
                                        <input type="text" placeholder="설비명" className="w-full p-2 border rounded-lg text-sm" value={newEqName} onChange={e=>setNewEqName(e.target.value)} />
                                        <button onClick={handleAddEquipment} className="w-full bg-slate-800 text-white py-2 rounded-lg text-sm font-bold">설비 추가</button>
                                    </div>
                                    <div className="mt-6 border-t pt-4 max-h-64 overflow-y-auto">
                                        {equipments.map(eq => (
                                            <div key={eq.id} className="flex justify-between py-2 border-b last:border-0 text-sm">
                                                <span><b>[{eq.id}]</b> {eq.name}</span>
                                                <button onClick={() => { if(confirm('삭제하시겠습니까?')) deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'equipments', eq.id)) }} className="text-rose-400"><Trash2 className="w-4 h-4" /></button>
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={() => setCurrentUser('')} className="w-full mt-8 border py-3 rounded-xl text-slate-500 font-bold flex items-center justify-center"><LogOut className="w-4 h-4 mr-2" /> 로그아웃</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {toast.show && (
                        <div className={`fixed top-20 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-lg text-white text-xs font-bold flex items-center z-[100] animate-in slide-in-from-top-4 ${toast.type === 'error' ? 'bg-rose-600' : 'bg-slate-800'}`}>
                            {toast.type === 'error' ? <AlertTriangle className="w-4 h-4 mr-2" /> : <CheckCircle2 className="w-4 h-4 text-emerald-400 mr-2" />}
                            {toast.message}
                        </div>
                    )}

                    <nav className="bg-white border-t border-slate-200 fixed bottom-0 w-full max-w-md flex shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                        <button className={`flex-1 py-3 flex flex-col items-center gap-1 ${activeTab === 'form' ? 'text-blue-700' : 'text-slate-400'}`} onClick={() => setActiveTab('form')}><ClipboardCheck className="w-5 h-5" /><span className="text-[10px] font-bold">상세 점검</span></button>
                        <button className={`flex-1 py-3 flex flex-col items-center gap-1 ${activeTab === 'history' ? 'text-blue-700' : 'text-slate-400'}`} onClick={() => setActiveTab('history')}><History className="w-5 h-5" /><span className="text-[10px] font-bold">이력/보고서</span></button>
                        <button className={`flex-1 py-3 flex flex-col items-center gap-1 ${activeTab === 'settings' ? 'text-blue-700' : 'text-slate-400'}`} onClick={() => setActiveTab('settings')}><Settings className="w-5 h-5" /><span className="text-[10px] font-bold">관리</span></button>
                    </nav>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
